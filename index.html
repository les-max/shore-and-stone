<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cedar Lux Properties | Cedar Creek Lake Custom Homes</title>
  <meta property="og:title" content="Cedar Lux Properties | Cedar Creek Lake Custom Homes" />
  <meta property="og:description" content="Bespoke lakefront homes on Cedar Creek Lake, just 60 minutes from Dallas." />
  <meta property="og:image" content="/lake-home.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/lake-home.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; background: #fafafa; }
    h1, h2, h3, h4, .serif { font-family: 'Playfair Display', serif; }
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .bg-lake { background-color: #0c1c2c; }
    .text-luxury-gold { color: #c5a059; }
    .bg-luxury-gold { background-color: #c5a059; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    #root { min-height: 100vh; }

    /* ── Easing ── */
    .ease-strong-out { transition-timing-function: cubic-bezier(0.23, 1, 0.32, 1); }

    /* ── Page transitions ── */
    @keyframes pageFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .page-enter { animation: pageFadeIn 180ms ease-out forwards; }

    /* ── Mobile menu ── */
    @keyframes menuSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mobile-menu-enter { animation: menuSlideIn 200ms cubic-bezier(0.23, 1, 0.32, 1) forwards; }

    /* ── Hero stagger ── */
    @keyframes heroFadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-item {
      opacity: 0;
      animation: heroFadeUp 650ms cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .hero-item-1 { animation-delay: 0ms; }
    .hero-item-2 { animation-delay: 80ms; }
    .hero-item-3 { animation-delay: 160ms; }
    .hero-item-4 { animation-delay: 260ms; }

    /* ── Modal entry ── */
    @keyframes modalBackdropIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalContentIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-modal-backdrop { animation: modalBackdropIn 200ms ease-out forwards; }
    .animate-modal-content { animation: modalContentIn 260ms cubic-bezier(0.23, 1, 0.32, 1) forwards; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .page-enter, .mobile-menu-enter, .hero-item,
      .animate-modal-backdrop, .animate-modal-content {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }

    /* Elegant Loading State - only visible until React mounts */
    #root:empty::before {
      content: 'Heading for the lake...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100%;
      color: #c5a059;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
<body class="bg-neutral-50 text-neutral-900 overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
